name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Test (cross-platform) ─────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets
      - name: test release
        run: cargo test --all-targets --release

  # ── Coverage ──────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (llvm-cov)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: collect coverage
        run: cargo llvm-cov --all-targets --lcov --output-path lcov.info
      - name: enforce threshold
        run: cargo llvm-cov --all-targets --fail-under-lines 90
      - name: upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true

  # ── FuSa gap check ────────────────────────────────────────────────────────
  fusa:
    name: FuSa gap check (rsfusa)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install rsfusa
        run: cargo install rsfusa --locked || echo "rsfusa not yet published, skipping"
      - name: run gap check
        run: |
          if command -v rsfusa &> /dev/null; then
            rsfusa check --fail-on-gap
          else
            echo "rsfusa not available — manual check required"
          fi

  # ── Fuzz (short) ─────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz (30s smoke)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz wire decoder (30s)
        run: |
          if [ -d fuzz ]; then
            cargo +nightly fuzz run fuzz_wire_decode -- -max_total_time=30 || true
          else
            echo "fuzz targets not yet configured, skipping"
          fi

  # ── Benchmark smoke ───────────────────────────────────────────────────────
  bench-smoke:
    name: Benchmark smoke
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: bench (1 iteration)
        run: cargo bench -- --test 2>/dev/null || cargo test --release

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
