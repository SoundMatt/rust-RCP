name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Test (cross-platform) ─────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build
        run: cargo build --all-targets
      - name: test
        run: cargo test --all-targets
      - name: test release
        run: cargo test --all-targets --release

  # ── Coverage ──────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (llvm-cov)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: collect coverage
        run: cargo llvm-cov --all-targets --lcov --output-path lcov.info
      - name: enforce threshold
        run: cargo llvm-cov --all-targets --fail-under-lines 90
      - name: upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  # ── FuSa gap check ────────────────────────────────────────────────────────
  fusa:
    name: FuSa gap check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run gap check
        run: bash scripts/fusa-gap-check.sh

  # ── Fuzz (short) ─────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz (30s smoke)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz wire decoder (30s)
        run: |
          if [ -d fuzz ]; then
            cargo +nightly fuzz run fuzz_wire_decode -- -max_total_time=30
          else
            echo "fuzz targets not yet configured, skipping"
          fi

  # ── Benchmark smoke ───────────────────────────────────────────────────────
  bench-smoke:
    name: Benchmark smoke
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: bench (1 iteration)
        run: cargo bench -- --test 2>/dev/null || cargo test --release

  # ── RELAY §12 CLI conformance (relay conform) ─────────────────────────────
  relay-conform:
    name: RELAY conform --strict
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: install relay
        run: go install github.com/SoundMatt/RELAY/cmd/relay@latest
      - name: build rcp binary
        run: cargo build --bin rcp --release
      - name: relay conform --strict
        run: relay conform --strict target/release/rcp

  # ── RELAY interop ─────────────────────────────────────────────────────────
  relay-interop:
    name: RELAY interop
    needs: relay-conform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: install relay
        run: go install github.com/SoundMatt/RELAY/cmd/relay@latest
      - name: build rcp binary
        run: cargo build --bin rcp --release
      - name: relay interop (rcp-status EQUIVALENT)
        run: |
          output=$(relay interop target/release/rcp 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "rcp-status"; then
            echo "$output" | grep -A3 "^rcp-status" | grep "rcp" | grep -q "EQUIVALENT"
          else
            echo "relay interop: no RCP vectors found on runner — skipping equivalence check"
          fi

  # ── RELAY wire+e2e unit tests (spec traceability) ─────────────────────────
  relay-conformance:
    name: RELAY spec v1.10 unit conformance
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run RELAY conformance tests
        run: |
          cargo test --lib -- 'wire::' 2>&1
          cargo test --lib -- 'e2e::' 2>&1

  # ── IEC 62443 cyber gap check ─────────────────────────────────────────────
  cyber:
    name: IEC 62443 cyber gap check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run cyber gap check
        run: bash scripts/cyber-gap-check.sh

  # ── SBOM ─────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: generate SBOM
        run: cargo cyclonedx --format json --override-filename bom.json
      - name: upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
